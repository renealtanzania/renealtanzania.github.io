    body {

      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    label {
      font-weight: bold;
      margin-right: 8px;
    }
    select {
      padding: 5px 8px;
      font-size: 16px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    #printBtn {
      display: block;
      margin: 20px auto 30px auto;
      padding: 10px 25px;
      font-size: 16px;
      cursor: pointer;
      background-color: #00539CFF;
      color: white;
      border: none;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    #printBtn:hover {
      background-color: #003F7FFF;
    }
    .box {
      padding: 15px;
      margin-bottom: 25px;
      border-radius: 8px;
      max-width: 960px;
      margin-left: auto;
      margin-right: auto;
    }
    .box-header {
      color: #007acc;
      font-size: 1.4em;
      margin-bottom: 12px;
      user-select: none;
    }
    .senta {
      display: block;
      margin-left: auto;
      margin-right: auto;
      width: 8%;
      margin-bottom: 1rem;
    }
    .mt-4 {
      margin-top: 8rem;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 14px;
      padding: 0.125rem;
      vertical-align: middle;
    }
    th, td {
      border: 1px solid #bbb;
      padding: 8px 12px;
      text-align: left;
    }
    @media(max-width:668px) {
      .smo { display: grid; }
    }
    .px-4 { padding-left: 1rem !important; padding-right: 1rem !important; }
    th {
      background-color: #e3e3e3;
      user-select: none;
    }
    .itemFilta { margin-top: 0.5rem; }
    @media print {
      #printBtn, .filters { display: none; }
      body { background-color: white; margin: 0; padding: 0; }
      .box { box-shadow: none; border: 1px solid black; margin: 10 15px 22px 0 !important; }
    }

    const boxFilter = document.getElementById('boxFilter');
    const regionFilter = document.getElementById('regionFilter');
    const itemFilter = document.getElementById('itemFilter');
    const destinationFilter = document.getElementById('destinationFilter');
    const contentDiv = document.getElementById('content');

    function getUniqueValues() {
      const boxesSet = new Set();
      const itemsSet = new Set();
      const destSet = new Set();
      const regionSet = new Set();
      data.boxes.forEach(box => {
        boxesSet.add(box.box);
        box.items.forEach(i => {
          itemsSet.add(i.item);
          destSet.add(i.destination);
          if (i.region) regionSet.add(i.region);
        });
      });
      return {
        boxes: [...boxesSet].sort((a, b) => {
          const aLetter = a.match(/[A-Z]+/);
          const bLetter = b.match(/[A-Z]+/);
          if (aLetter && bLetter) {
            if (aLetter[0].length !== bLetter[0].length) return aLetter[0].length - bLetter[0].length;
            if (aLetter[0] !== bLetter[0]) return aLetter[0].localeCompare(bLetter[0]);
          }
          return a.localeCompare(b);
        }),
        items: [...itemsSet].sort(),
        destinations: [...destSet].sort(),
        regions: [...regionSet].sort()
      };
    }

    function populateFilters() {
      const { boxes, items, destinations, regions } = getUniqueValues();
      boxes.forEach(box => {
        const option = document.createElement('option');
        option.value = box;
        option.textContent = `Box ${box}`;
        boxFilter.appendChild(option);
      });
      regions.forEach(region => {
        const option = document.createElement('option');
        option.value = region;
        option.textContent = region;
        regionFilter.appendChild(option);
      });
      items.forEach(item => {
        const option = document.createElement('option');
        option.value = item;
        option.textContent = item;
        itemFilter.appendChild(option);
      });
      destinations.forEach(dest => {
        const option = document.createElement('option');
        option.value = dest;
        option.textContent = dest;
        destinationFilter.appendChild(option);
      });
    }

    function renderFilteredBoxes() {
      const selectedBox = boxFilter.value;
      const selectedRegion = regionFilter.value;
      const selectedItem = itemFilter.value;
      const selectedDest = destinationFilter.value;

      contentDiv.innerHTML = '';

      data.boxes.forEach(box => {
        const matchesBox = selectedBox ? box.box === selectedBox : true;
        if (!matchesBox) return;

        const filteredItems = box.items.filter(item => {
          const matchesRegion = selectedRegion ? item.region === selectedRegion : true;
          const matchesItem = selectedItem ? item.item === selectedItem : true;
          const matchesDest = selectedDest ? item.destination === selectedDest : true;
          return matchesRegion && matchesItem && matchesDest;
        });

        if (filteredItems.length > 0) {
          const boxDiv = document.createElement('div');
          boxDiv.className = 'box';

          const header = document.createElement('div');
          header.className = 'box-header';
          header.textContent = `Box: ${box.box}`;
          boxDiv.appendChild(header);

          const table = document.createElement('table');
          const thead = document.createElement('thead');
          const trHead = document.createElement('tr');
          ['Item', 'Quantity', 'Provided By', 'Received By', 'Date', 'Destination', 'Region'].forEach(heading => {
            const th = document.createElement('th');
            th.textContent = heading;
            trHead.appendChild(th);
          });
          thead.appendChild(trHead);
          table.appendChild(thead);

          const tbody = document.createElement('tbody');
          filteredItems.forEach(item => {
            const tr = document.createElement('tr');
            [item.item, item.quantity, item.provided_by || '', item.received_by || '', item.date || '', item.destination, item.region || ''].forEach(val => {
              const td = document.createElement('td');
              td.textContent = val;
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });

          table.appendChild(tbody);
          boxDiv.appendChild(table);
          contentDiv.appendChild(boxDiv);
        }
      });

      if (contentDiv.innerHTML.trim() === '') {
        contentDiv.innerHTML = '<p style="text-align:center; font-style: italic; color: #666;">No matching items found.</p>';
      }
    }

    populateFilters();
    renderFilteredBoxes();

    boxFilter.addEventListener('change', renderFilteredBoxes);
    regionFilter.addEventListener('change', renderFilteredBoxes);
    itemFilter.addEventListener('change', renderFilteredBoxes);
    destinationFilter.addEventListener('change', renderFilteredBoxes);
  </script>
